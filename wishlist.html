<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Bootstrap demo</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>
    <body class="bg-light">
        <div class="container py-5">
            <div class="row">
                <div class="col-sm-10 mx-auto">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h2>WishList</h2>
                            <form id="giftFrom" class="row mb-4">
                                <div class="col-md-5">
                                    <input type="text" id="giftName" class="form-control" required placeholder="Название подарка">
                                </div>
                                <div class="col-md-5">
                                    <input type="text" id="giftDescription" class="form-control" required placeholder="Описание">
                                </div>
                                <div class="col-md-2">
                                    <input id="giftSubmit" type="submit" class="btn btn-primary form-control" value="Добавить">
                                </div>
                                <input type="hidden" id="giftId">
                            </form>
                            <div id="giftList" class="list-group"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script>
            const STORAGE_KEY = "wishlist_gifts";
            const giftFrom = document.getElementById('giftFrom');
            const giftName = document.getElementById('giftName');
            const giftDescription = document.getElementById('giftDescription');
            const giftList = document.getElementById('giftList');
            const giftId = document.getElementById('giftId');
            const giftSubmit = document.getElementById('giftSubmit');
            function loadGifts(){
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            }

            function saveGifts(gifts){
                localStorage.setItem(STORAGE_KEY, JSON.stringify(gifts));
                render();
            }

            giftFrom.onsubmit = (ev)=>{
                ev.preventDefault();
                const gifts = loadGifts();
                const name = giftName.value.trim();
                const description = giftDescription.value.trim();
                const giftIdValue = giftId.value;
                if(giftIdValue){
                    const index = gifts.findIndex(g=>g.id===Number(giftIdValue));
                    gifts[index].name = name;
                    gifts[index].description = description;
                }else{
                    const giftId = Date.now() + Math.floor(Math.random() * 1000);
                    const newGift = {
                        id: giftId,
                        name: name,
                        description: description
                    }
                    gifts.push(newGift);
                }

                saveGifts(gifts);
                giftFrom.reset();
            }

            function render(){
                const gifts = loadGifts();
                giftList.innerHTML = "";
                gifts.forEach((gift)=>{
                   const div = document.createElement('div');
                   div.className = 'list-group-item-action row py-3 border';
                   const contentDiv = document.createElement('div');
                   contentDiv.className = 'ms-2 col-sm-8';
                   const title = document.createElement('div');
                   title.className = 'fw-bold';
                   title.textContent = gift.name;
                   const desc = document.createElement('div');
                   desc.className = 'text-muted small';
                   desc.textContent = gift.description;


                   const actionDiv = document.createElement('div');
                   actionDiv.className = 'col-sm-3';
                   const editBtn = document.createElement('button');
                   editBtn.className = 'btn btn-sm btn-outline-secondary me-3';
                   editBtn.textContent = "✎";
                   editBtn.onclick = (e)=>{
                       giftName.value = gift.name;
                       giftDescription.value = gift.description;
                       giftId.value = gift.id;
                       giftSubmit.value = "Сохранить";
                       giftName.focus();
                   }

                   const deleteBtn = document.createElement('button');
                   deleteBtn.className = 'btn btn-sm btn-outline-danger';
                   deleteBtn.textContent = '❌';
                   deleteBtn.onclick = ()=>{
                       const currentGifts = loadGifts();
                       const indexToDelete = currentGifts.findIndex(g=>g.id===gift.id);
                       currentGifts.splice(indexToDelete, 1);
                       saveGifts(currentGifts);
                   }
                   actionDiv.appendChild(editBtn);
                   actionDiv.appendChild(deleteBtn);
                   contentDiv.appendChild(title);
                   contentDiv.appendChild(desc);
                   div.appendChild(contentDiv);
                   div.appendChild(actionDiv);
                   giftList.appendChild(div);
                });
            }

            render();

        </script>
    </body>
</html>
